<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athlete Performance Log</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { border-left: 4px solid var(--primary); padding-left: 10px; font-size: 1.2rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        textarea { height: 80px; resize: none; }
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { opacity: 0.9; }
        #ai-feedback { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
        .tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; margin-right: 5px; background: #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏆 운동선수 성장 일지</h1>
        <p>오늘의 기록이 내일의 승리를 만듭니다.</p>
    </header>

    <div class="card">
        <h2>📅 기본 정보 및 일정</h2>
        <div class="grid">
            <div>
                <label>날짜</label>
                <input type="date" id="date">
            </div>
            <div>
                <label>체중 (kg)</label>
                <input type="number" step="0.1" id="weight" placeholder="00.0">
            </div>
        </div>
        <div style="margin-top:10px;">
            <label>시합/평가 일정</label>
            <input type="text" id="event" placeholder="예: 4월 13일 바디프로필, 15일 정기전">
        </div>
    </div>

    <div class="card">
        <h2>💪 운동 및 식단</h2>
        <label>오늘의 운동</label>
        <textarea id="workout" placeholder="훈련 내용, 강도, 세트 수 등"></textarea>
        <label>식단 기록</label>
        <textarea id="diet" placeholder="아침/점심/저녁/보충제"></textarea>
    </div>

    <div class="card">
        <h2>📝 자기 분석 및 컨디션</h2>
        <div class="grid">
            <div>
                <label>잘된 점</label>
                <textarea id="pros"></textarea>
            </div>
            <div>
                <label>보완할 점</label>
                <textarea id="cons"></textarea>
            </div>
        </div>
        <div style="margin-top:10px;">
            <label>부상 및 통증 부위</label>
            <select id="injury">
                <option value="none">없음 (최상)</option>
                <option value="mild">미세 통증 (주의)</option>
                <option value="pain">통증 있음 (관리 필요)</option>
                <option value="serious">부상 중 (휴식/치료)</option>
            </select>
        </div>
    </div>

    <button onclick="saveLog()">오늘의 일지 저장 및 AI 분석</button>

    <div id="feedback-container" class="card" style="display:none;">
        <h2>🤖 AI 코칭 피드백</h2>
        <div id="ai-feedback" class="card">
            <p id="feedback-text">데이터를 분석 중입니다...</p>
        </div>
    </div>
</div>

<script>
    // 오늘 날짜 기본값 설정
    document.getElementById('date').value = new Date().toISOString().substring(0, 10);

    function saveLog() {
        const logData = {
            date: document.getElementById('date').value,
            weight: document.getElementById('weight').value,
            event: document.getElementById('event').value,
            workout: document.getElementById('workout').value,
            diet: document.getElementById('diet').value,
            pros: document.getElementById('pros').value,
            cons: document.getElementById('cons').value,
            injury: document.getElementById('injury').value
        };

        // 로컬 스토리지 저장
        localStorage.setItem('workout_log_' + logData.date, JSON.stringify(logData));
        
        generateFeedback(logData);
    }

    function generateFeedback(data) {
        const feedbackBox = document.getElementById('feedback-container');
        const feedbackText = document.getElementById('feedback-text');
        feedbackBox.style.display = 'block';

        let feedback = "";

        // 1. 부상 관리 피드백
        if(data.injury !== 'none') {
            feedback += "⚠️ <b>부상 관리:</b> 현재 통증이 감지되었습니다. 무리한 고중량 훈련보다는 가동성 확보와 저강도 재활 운동을 권장합니다. 냉찜질 혹은 스트레칭 시간을 평소보다 2배 늘리세요.<br><br>";
        }

        // 2. 일정 대비 피드백
        if(data.event) {
            feedback += `📅 <b>일정 관리:</b> [${data.event}] 일정이 얼마 남지 않았습니다. 체중이 ${data.weight}kg인 점을 고려하여 컨디셔닝 위주로 조절하고, 충분한 수면(8시간 이상)을 확보하세요.<br><br>`;
        }

        // 3. 보강 훈련 제안
        if(data.cons.includes('체력') || data.cons.includes('지침')) {
            feedback += "🏃 <b>보강 훈련:</b> 심폐 지구력 보강을 위해 인터벌 러닝 15분 추가를 추천합니다.<br><br>";
        } else if(data.cons.includes('힘') || data.cons.includes('근력')) {
            feedback += "🏋️ <b>보강 훈련:</b> 하체 폭발력을 위해 스쿼트 점프와 플라이오메트릭 훈련을 루틴에 추가해 보세요.<br><br>";
        } else {
            feedback += "✨ <b>분석:</b> 전반적으로 균형 잡힌 훈련입니다. '잘된 점'에 기록하신 감각을 유지하기 위해 이미지 트레이닝을 실시하세요.<br><br>";
        }

        // 4. 식단 피드백
        if(!data.diet.includes('단백질') && !data.diet.includes('닭')) {
            feedback += "🥗 <b>영양:</b> 근회복을 위해 단백질 섭취량을 조금 더 늘려보시는 건 어떨까요?";
        } else {
            feedback += "✅ <b>영양:</b> 적절한 영양 섭취가 이루어지고 있습니다.";
        }

        feedbackText.innerHTML = feedback;
        alert("오늘의 일지가 성공적으로 저장되었습니다!");
    }
</script>

</body>
</html>
