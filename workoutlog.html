<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운동 기록 일지</title>
    <style>
        :root { --primary: #059669; --bg: #f0fdf4; --card: #ffffff; --text: #064e3b; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { border-left: 4px solid var(--primary); padding-left: 10px; font-size: 1.1rem; color: var(--primary); margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        label { display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
        .row { margin-bottom: 15px; }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 1rem; font-weight: bold; }
        #ai-feedback { background: #f9fafb; border: 1px solid #e5e7eb; padding: 15px; border-radius: 8px; margin-top: 10px; white-space: pre-wrap; }
        .stat-badge { background: #ecfdf5; color: #065f46; padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📝 운동 기록 일지</h1>
        <p>나의 페이스에 맞춰 건강하게 기록하세요.</p>
    </header>

    <div class="card">
        <h2>👤 나의 정보</h2>
        <div class="grid">
            <div>
                <label>성별</label>
                <select id="gender">
                    <option value="male">남성</option>
                    <option value="female">여성</option>
                </select>
            </div>
            <div>
                <label>나이</label>
                <input type="number" id="age" placeholder="예: 25">
            </div>
        </div>
        <div class="grid">
            <div>
                <label>오늘의 체중 (kg)</label>
                <input type="number" step="0.1" id="weight" placeholder="00.0">
            </div>
            <div>
                <label>시합/평가/촬영 일정</label>
                <input type="text" id="event" placeholder="예: 하키 시합, 바디프로필">
            </div>
        </div>
    </div>

    <div class="card">
        <h2>🏃 오늘의 운동</h2>
        <div class="row">
            <label>유산소 운동 (시간)</label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="number" id="cardio-time" placeholder="예: 30">
                <span>분</span>
            </div>
        </div>
        <div class="row">
            <label>본운동 (드릴/웨이트/기술 등)</label>
            <textarea id="main-workout" placeholder="예: 아이스하키 퍽 핸들링 드릴, 스쿼트 5세트 등"></textarea>
        </div>
        <div class="grid">
            <div>
                <label>잘된 점</label>
                <textarea id="pros"></textarea>
            </div>
            <div>
                <label>잘 안된 점 / 보완점</label>
                <textarea id="cons"></textarea>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>🥗 식단 및 영양</h2>
        <label>오늘 먹은 음식 기록 (쉼표로 구분)</label>
        <textarea id="diet" placeholder="예: 닭가슴살 200g, 공기밥 1공기, 샐러드, 바나나 1개" oninput="estimateCalories()"></textarea>
        <div style="margin-top: 10px;">
            <span class="stat-badge">예상 총 칼로리: <span id="cal-display">0</span> kcal</span>
        </div>
    </div>

    <button onclick="saveAndAnalyze()">기록 저장 및 AI 피드백 받기</button>

    <div id="feedback-container" class="card" style="display:none;">
        <h2>🤖 AI의 분석 및 가이드</h2>
        <div id="ai-feedback"></div>
    </div>
</div>

<script>
    // 간단한 칼로리 데이터베이스
    const calDb = {
        '닭가슴살': 165, '밥': 300, '단백질쉐이크': 150, '고구마': 130, '바나나': 100,
        '샐러드': 50, '삼겹살': 500, '사과': 60, '계란': 80, '소고기': 250, '샌드위치': 400
    };

    function estimateCalories() {
        const text = document.getElementById('diet').value;
        let total = 0;
        Object.keys(calDb).forEach(food => {
            if (text.includes(food)) {
                // 수량 체크 로직은 간단하게 1개 포함 시 더함 (확장 가능)
                total += calDb[food];
            }
        });
        document.getElementById('cal-display').innerText = total;
        return total;
    }

    function saveAndAnalyze() {
        const data = {
            gender: document.getElementById('gender').value,
            age: document.getElementById('age').value,
            weight: parseFloat(document.getElementById('weight').value),
            cardio: document.getElementById('cardio-time').value,
            main: document.getElementById('main-workout').value,
            cons: document.getElementById('cons').value,
            event: document.getElementById('event').value,
            calories: estimateCalories()
        };

        const feedbackBox = document.getElementById('feedback-container');
        const feedbackArea = document.getElementById('ai-feedback');
        feedbackBox.style.display = 'block';

        // 분석 로직
        let feedback = "";
        
        // 1. 칼로리 및 영양 분석
        const bmr = data.gender === 'male' ? (10 * data.weight + 6.25 * 175 - 5 * data.age + 5) : (10 * data.weight + 6.25 * 160 - 5 * data.age - 161);
        const recommendCal = bmr * 1.5; // 활동량 고려

        feedback += `📊 [영양 분석]\n`;
        feedback += `현재 기록된 섭취량은 약 ${data.calories}kcal입니다.\n`;
        if (data.calories < recommendCal * 0.7) {
            feedback += `❗ 경고: 현재 체중(${data.weight}kg) 대비 섭취량이 너무 적습니다. 근손실 위험이 있으니 단백질과 탄수화물을 더 보충하세요.\n\n`;
        } else if (data.calories > recommendCal * 1.3) {
            feedback += `⚠️ 알림: 활동량에 비해 섭취량이 많습니다. 체중 관리가 목표라면 식단 조절이 필요합니다.\n\n`;
        } else {
            feedback += `✅ 양호: 활동량에 적절한 섭취량을 유지하고 계십니다.\n\n`;
        }

        // 2. 운동 피드백
        feedback += `🏋️ [운동 및 보강 제안]\n`;
        if (data.cardio > 60) {
            feedback += `- 유산소 비중이 높습니다. 본운동(${data.main})의 수행력을 위해 유산소를 40분 이내로 조절해 보세요.\n`;
        }
        if (data.cons.includes('통증') || data.cons.includes('아픔')) {
            feedback += `- 통증이 언급되었습니다. 오늘은 무리한 드릴보다는 동적 스트레칭과 휴식에 집중하세요.\n`;
        }
        if (data.event) {
            feedback += `- [${data.event}] 일정이 있습니다. 이번 주는 기술적인 드릴 위주로 컨디션을 관리하세요.`;
        }

        feedbackArea.innerText = feedback;
        alert("오늘의 기록이 저장되었습니다!");
    }
</script>

</body>
</html>
