<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sporty-Us | 취미 운동 매칭</title>
    <style>
        /* [1. 기본 스타일 & 다이내믹 배경] */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@800&family=Pretendard:wght@400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        
        body { 
            background-color: #ffffff;
            /* 스포츠 브랜드의 속도감이 느껴지는 사선 패턴 배경 */
            background-image: 
                linear-gradient(135deg, #f8f9fa 25%, transparent 25%), 
                linear-gradient(225deg, #f8f9fa 25%, transparent 25%), 
                linear-gradient(45deg, #f8f9fa 25%, transparent 25%), 
                linear-gradient(315deg, #f8f9fa 25%, #ffffff 25%);
            background-position: 40px 0, 40px 0, 0 0, 0 0;
            background-size: 80px 80px;
            background-repeat: repeat;
            color: #1d1d1f; 
            overflow-x: hidden;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px 100px; position: relative; }

        /* [2. 화면 전환 애니메이션] */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* [3. 메인 페이지 - 에너지 히어로 섹션] */
        .hero {
            height: 30vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            border-bottom: 2px solid #007bff;
        }

        /* 로고 뒤에 은은한 에너지 광원 효과 추가 */
        .hero::after {
            content: ''; position: absolute; width: 300px; height: 100px;
            background: radial-gradient(circle, rgba(0,123,255,0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .logo-large {
            font-family: 'Poppins', sans-serif;
            font-size: 4rem; 
            font-weight: 800;
            letter-spacing: -2px;
            color: #1d1d1f;
            line-height: 1;
            margin-bottom: 10px;
        }
        .logo-large span { color: #007bff; text-shadow: 0 0 20px rgba(0,123,255,0.2); }
        .hero-tagline { font-size: 1.1rem; color: #444; font-weight: 700; letter-spacing: -0.5px; }

        /* [4. 2x2 카테고리 그리드] */
        .category-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 60px; 
            margin-top: 60px; 
        }
        
        .item-card { 
            background: rgba(255, 255, 255, 0.95);
            padding: 70px 20px; 
            border-radius: 30px; 
            text-align: center; 
            cursor: pointer; 
            border: 2px solid #eee; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* 카드 호버 시 사선 포인트 디자인 */
        .item-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,123,255,0.05), transparent);
            transition: 0.5s;
        }

        .item-card:hover { 
            border-color: #007bff;
            box-shadow: 0 20px 40px rgba(0, 123, 255, 0.15);
            transform: translateY(-10px) rotate(1deg); /* 약간의 회전으로 역동성 부여 */
        }
        .item-card:hover::before { left: 100%; }

        .item-card span.icon { font-size: 4rem; display: block; margin-bottom: 20px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        .item-card strong { font-size: 1.4rem; font-weight: 800; color: #1d1d1f; }

        /* [5. 드롭다운 메뉴 - 스포티 다크 모드 포인트] */
        .sports-dropdown {
            display: none; 
            position: absolute; 
            top: 105%; left: 0; width: 100%; 
            background: #1d1d1f; /* 메뉴는 다크하게 하여 대비 강조 */
            border-radius: 24px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); 
            padding: 15px 0; 
            z-index: 100; 
            border: none;
        }

        .category-item:hover .sports-dropdown,
        .category-item.is-open .sports-dropdown { display: block; animation: powerIn 0.3s cubic-bezier(0.19, 1, 0.22, 1); }

        @keyframes powerIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .sports-dropdown a { 
            display: block; padding: 18px 35px; text-decoration: none; 
            color: #ffffff; font-size: 1.1rem; font-weight: 600;
            transition: 0.2s; border-bottom: 1px solid #333;
        }
        .sports-dropdown a:hover { background: #007bff; color: #fff; padding-left: 45px; }
        .sports-dropdown a:last-child { border-bottom: none; }

        /* [6. 필터 페이지 스타일] */
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
        .logo-small { font-family: 'Poppins', sans-serif; font-size: 1.8rem; font-weight: 800; color: #1d1d1f; }
        .logo-small span { color: #007bff; }
        
        .back-btn { background: #1d1d1f; color: #fff; border: none; padding: 12px 25px; border-radius: 15px; cursor: pointer; font-weight: 700; }
        
        .filter-bar { 
            background: #ffffff; padding: 40px; border-radius: 30px; border: 3px solid #1d1d1f; 
            display: flex; gap: 30px; margin-bottom: 60px; align-items: flex-end; 
            box-shadow: 10px 10px 0px #007bff; /* 스포티한 팝아트 느낌의 그림자 */
        }
        .filter-group label { font-size: 1rem; font-weight: 900; color: #1d1d1f; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .filter-group select { 
            width: 100%; padding: 18px; border-radius: 15px; border: 2px solid #ddd; font-size: 1.1rem; font-weight: 600;
            appearance: none; background: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>') no-repeat right 20px center;
            background-color: #f8f9fa;
        }
        
        .search-btn { background: #007bff; color: #fff; border: none; padding: 0 50px; border-radius: 15px; font-weight: 800; cursor: pointer; height: 62px; font-size: 1.2rem; }

        .result-section { text-align: center; padding: 150px; border: 3px dashed #ddd; border-radius: 40px; color: #aaa; font-weight: 700; background: #fff; }

        @media (max-width: 800px) {
            .category-grid { grid-template-columns: 1fr; gap: 30px; }
            .logo-large { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <main id="main-page" class="page active">
        <header class="hero">
            <div class="logo-large">Sporty<span>-Us</span></div>
            <p class="hero-tagline">당신의 일상이 더 스포티해지는 가장 쉬운 방법</p>
        </header>

        <div class="container">
            <div class="category-grid">
                <div class="category-item" onclick="toggleMenu(this)">
                    <div class="item-card"><span class="icon">⚽</span><strong>구기 종목</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('풋살')">풋살</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('축구')">축구</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('농구')">농구</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('야구')">야구</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('배구')">배구</a>
                    </div>
                </div>
                <div class="category-item" onclick="toggleMenu(this)">
                    <div class="item-card"><span class="icon">🎾</span><strong>라켓 종목</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('테니스')">테니스</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('배드민턴')">배드민턴</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('스쿼시')">스쿼시</a>
                    </div>
                </div>
                <div class="category-item" onclick="toggleMenu(this)">
                    <div class="item-card"><span class="icon">🏃</span><strong>액티비티</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('러닝')">러닝</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('클라이밍')">클라이밍</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('사이클')">사이클</a>
                    </div>
                </div>
                <div class="category-item" onclick="toggleMenu(this)">
                    <div class="item-card"><span class="icon">❄️</span><strong>이색 및 계절</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('아이스하키')">아이스하키</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('피겨')">피겨</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('서핑')">서핑</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('복싱')">복싱</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('주짓수')">주짓수</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <main id="filter-page" class="page">
        <div class="container">
            <div class="header-bar">
                <button class="back-btn" onclick="goToMainPage()">← BACK</button>
                <div class="logo-small">Sporty<span>-Us</span></div>
                <h2 id="selected-sport-title">종목명</h2>
            </div>

            <section class="filter-bar">
                <div class="filter-group" style="flex:1">
                    <label>Age Limit</label>
                    <select>
                        <option>전체</option><option>무관</option><option>10대</option>
                        <option>20대</option><option>30대</option><option>40대+</option>
                    </select>
                </div>
                <div class="filter-group" style="flex:1">
                    <label>Location</label>
                    <select>
                        <option>서울</option><option>경기</option><option>인천</option>
                        <option>강원도</option><option>충청도</option><option>전라도</option>
                        <option>경상도</option><option>제주도</option>
                    </select>
                </div>
                <button class="search-btn">FIND TEAM</button>
            </section>

            <div class="result-section">
                <p id="result-text-display">새로운 팀원이 기다리고 있습니다!</p>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu(element) {
            const isOpen = element.classList.contains('is-open');
            document.querySelectorAll('.category-item').forEach(item => item.classList.remove('is-open'));
            if (!isOpen) element.classList.add('is-open');
        }

        function goToFilterPage(sportName) {
            event.stopPropagation();
            document.getElementById('selected-sport-title').innerText = sportName.toUpperCase();
            document.getElementById('main-page').classList.remove('active');
            document.getElementById('filter-page').classList.add('active');
            window.scrollTo(0, 0);
        }

        function goToMainPage() {
            document.getElementById('filter-page').classList.remove('active');
            document.getElementById('main-page').classList.add('active');
            document.querySelectorAll('.category-item').forEach(item => item.classList.remove('is-open'));
        }
    </script>

</body>
</html>
