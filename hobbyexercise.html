<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sporty-Us | 취미 운동 매칭</title>
    <style>
        /* 기본 스타일 (기존과 동일) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f8f9fa; color: #333; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        
        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center;
        }

        /* 섹션 제어 */
        .section { display: none; }
        .section.active { display: block; }

        /* 종목 카드 스타일 */
        .category-grid, .sports-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px;
        }
        .item-card {
            background: white; padding: 30px 20px; border-radius: 15px; text-align: center; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 2px solid transparent;
        }
        .item-card:hover { transform: translateY(-5px); border-color: #007bff; }
        .item-card .icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        /* 필터 및 결과 (이전과 동일) */
        .filter-bar { background: white; padding: 20px; border-radius: 12px; display: flex; gap: 15px; margin: 30px 0; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .back-btn { background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>오늘부터 즐거운 취미 운동!</h1>
        <p>당신에게 딱 맞는 팀을 찾아보세요.</p>
    </header>

    <div class="container">
        
        <section id="category-section" class="section active">
            <h2 style="text-align: center;">어떤 분야의 운동을 찾으시나요?</h2>
            <div class="category-grid">
                <div class="item-card" onclick="showSports('ball')">
                    <span class="icon">⚽</span>
                    <strong>구기 종목</strong>
                </div>
                <div class="item-card" onclick="showSports('racket')">
                    <span class="icon">🎾</span>
                    <strong>라켓 종목</strong>
                </div>
                <div class="item-card" onclick="showSports('activity')">
                    <span class="icon">🏃</span>
                    <strong>액티비티</strong>
                </div>
                <div class="item-card" onclick="showSports('special')">
                    <span class="icon">❄️</span>
                    <strong>이색/계절</strong>
                </div>
            </div>
        </section>

        <section id="sports-section" class="section">
            <button class="back-btn" onclick="goBack()">← 뒤로가기</button>
            <h2 id="selected-category-title" style="margin-bottom: 20px;">세부 종목을 선택하세요</h2>
            <div id="sports-list" class="sports-grid">
                </div>
        </section>

        <section id="filter-section" class="section">
            <div class="filter-bar">
                <select id="gender"><option>성별</option><option>남성</option><option>여성</option></select>
                <select id="age"><option>나이대</option><option>20대</option><option>30대</option></select>
                <select id="region"><option>지역</option><option>서울</option><option>경기</option></select>
                <button style="background:#007bff; color:white; border:none; padding:10px 20px; border-radius:8px;">검색</button>
            </div>
            <p style="text-align:center; color:#888;">검색 결과가 여기에 표시됩니다.</p>
        </section>

    </div>

    <script>
        // 데이터 구조
        const sportsData = {
            ball: { title: "⚽ 구기 종목", list: ["풋살", "축구", "농구", "야구", "배구"] },
            racket: { title: "🎾 라켓 종목", list: ["테니스", "배드민턴", "스쿼시"] },
            activity: { title: "🏃 액티비티", list: ["러닝", "클라이밍", "사이클"] },
            special: { title: "❄️ 이색/계절", list: ["아이스하키", "피겨", "서핑", "복싱", "주짓수"] }
        };

        // 섹션 전환 함수
        function showSports(categoryKey) {
            const category = sportsData[categoryKey];
            const sportsListDiv = document.getElementById('sports-list');
            const title = document.getElementById('selected-category-title');

            // 1. 제목 업데이트
            title.innerText = category.title;

            // 2. 종목 리스트 생성
            sportsListDiv.innerHTML = ''; // 초기화
            category.list.forEach(sport => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `<strong>${sport}</strong>`;
                card.onclick = () => showFilters(sport); // 클릭 시 필터 섹션으로
                sportsListDiv.appendChild(card);
            });

            // 3. 화면 전환
            document.getElementById('category-section').classList.remove('active');
            document.getElementById('sports-section').classList.add('active');
        }

        function showFilters(sportName) {
            // 상세 종목 선택 시 필터 바 노출
            document.getElementById('filter-section').classList.add('active');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            alert(sportName + "을(를) 선택하셨습니다. 조건을 설정해 보세요!");
        }

        function goBack() {
            document.getElementById('sports-section').classList.remove('active');
            document.getElementById('filter-section').classList.remove('active');
            document.getElementById('category-section').classList.add('active');
        }
    </script>

</body>
</html>
