<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sporty-Us | 취미 운동 매칭</title>
    <style>
        /* [1. 기본 스타일 & 폰트] */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@800&family=Pretendard:wght@400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #ffffff; color: #1d1d1f; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

        /* [2. 화면 전환 애니메이션] */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* [3. 메인 페이지 - 로고 중심 히어로 섹션] */
        .hero {
            background-color: #f8f9fa; /* 사진 대신 깔끔한 연회색 배경 */
            height: 45vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        /* 텍스트 로고 디자인 */
        .logo-large {
            font-family: 'Poppins', sans-serif;
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 5px;
            color: #1d1d1f;
        }
        .logo-large span { color: #007bff; } /* -Us 부분에 포인트 컬러 */
        
        .hero-tagline {
            font-size: 1.1rem;
            color: #86868b;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* [4. 2x2 카테고리 그리드] */
        .category-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 30px; 
            margin-top: 60px; 
        }
        .category-item { position: relative; }
        
        .item-card { 
            background: #ffffff; 
            padding: 50px 20px; 
            border-radius: 20px; 
            text-align: center; 
            cursor: pointer; 
            border: 1px solid #e5e5e7; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .item-card:hover, .category-item.is-open .item-card { 
            border-color: #007bff;
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.08);
            transform: translateY(-5px);
        }
        .item-card span.icon { font-size: 3rem; display: block; margin-bottom: 15px; }
        .item-card strong { font-size: 1.2rem; font-weight: 700; color: #1d1d1f; }

        /* [5. 드롭다운 메뉴] */
        .sports-dropdown {
            display: none; 
            position: absolute; 
            top: 100%; 
            left: 0; 
            width: 100%; 
            background: #ffffff;
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            padding: 10px 0; 
            z-index: 100; 
            margin-top: 15px;
            border: 1px solid #eee;
            overflow: hidden;
        }

        /* 마우스 이탈 방지 브릿지 */
        .sports-dropdown::before {
            content: ''; position: absolute; top: -20px; left: 0; width: 100%; height: 20px; background: transparent;
        }

        .category-item:hover .sports-dropdown,
        .category-item.is-open .sports-dropdown { display: block; animation: slideUp 0.3s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .sports-dropdown a { 
            display: block; padding: 15px 25px; text-decoration: none; color: #424245; font-size: 1rem; 
            transition: all 0.2s; border-bottom: 1px solid #f5f5f7;
        }
        .sports-dropdown a:hover { background: #f5faff; color: #007bff; font-weight: 600; padding-left: 35px; }
        .sports-dropdown a:last-child { border-bottom: none; }

        /* [6. 필터 페이지 스타일] */
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo-small { font-family: 'Poppins', sans-serif; font-size: 1.5rem; font-weight: 800; color: #1d1d1f; }
        .logo-small span { color: #007bff; }
        
        .back-btn { background: #f5f5f7; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; color: #1d1d1f; transition: 0.2s; }
        .back-btn:hover { background: #e8e8ed; }
        
        .filter-bar { background: #ffffff; padding: 35px; border-radius: 24px; border: 1px solid #e5e5e7; display: flex; gap: 25px; margin-bottom: 40px; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 10px; flex: 1; }
        .filter-group label { font-size: 0.9rem; font-weight: 700; color: #86868b; text-transform: uppercase; margin-left: 5px; }
        .filter-group select { 
            padding: 14px; border-radius: 12px; border: 1px solid #d2d2d7; font-size: 1rem; color: #1d1d1f;
            appearance: none; background: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%2386868b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>') no-repeat right 15px center;
            background-color: #fff;
        }
        
        .search-btn { background: #007bff; color: #fff; border: none; padding: 0 40px; border-radius: 12px; font-weight: 700; cursor: pointer; height: 52px; font-size: 1rem; transition: background 0.2s; }
        .search-btn:hover { background: #0062cc; }

        .result-section { text-align: center; padding: 100px; border: 1px solid #e5e5e7; border-radius: 24px; color: #86868b; background-color: #fbfbfd; }

        @media (max-width: 700px) {
            .logo-large { font-size: 3.5rem; }
            .category-grid { grid-template-columns: 1fr; gap: 20px; }
            .filter-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

    <main id="main-page" class="page active">
        <header class="hero">
            <div class="logo-large">Sporty<span>-Us</span></div>
            <p class="hero-tagline">지루한 일상을 깨우는 움직임</p>
        </header>

        <div class="container">
            <div class="category-grid">
                <div class="category-item" onclick="toggleMenu(this)">
                    <div class="item-card"><span class="icon">⚽</span><strong>구기 종목</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('풋살')">풋살</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('축구')">축구</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('농구')">농구</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('야구')">야구</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('배구')">배구</a>
                    </div>
                </div>
                <div class="category-item" onclick="toggleMenu(this)">
                    <div class="item-card"><span class="icon">🎾</span><strong>라켓 종목</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('테니스')">테니스</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('배드민턴')">배드민턴</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('스쿼시')">스쿼시</a>
                    </div>
                </div>
                <div class="category-item" onclick="toggleMenu(this)">
                    <div class="item-card"><span class="icon">🏃</span><strong>라이프스타일 / 액티비티</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('러닝')">러닝</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('클라이밍')">클라이밍</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('사이클')">사이클</a>
                    </div>
                </div>
                <div class="category-item" onclick="toggleMenu(this)">
                    <div class="item-card"><span class="icon">❄️</span><strong>이색 및 계절 스포츠</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('아이스하키')">아이스하키</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('피겨')">피겨</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('서핑')">서핑</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('복싱')">복싱</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('주짓수')">주짓수</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <main id="filter-page" class="page">
        <div class="container">
            <div class="header-bar">
                <button class="back-btn" onclick="goToMainPage()">← 카테고리</button>
                <div class="logo-small">Sporty<span>-Us</span></div>
                <h2 id="selected-sport-title" style="font-weight: 700; color: #1d1d1f;">종목명</h2>
            </div>

            <section class="filter-bar">
                <div class="filter-group">
                    <label>Age</label>
                    <select>
                        <option>전체</option><option>무관</option><option>10대</option>
                        <option>20대</option><option>30대</option><option>40대+</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Region</label>
                    <select>
                        <option>서울</option><option>경기</option><option>인천</option>
                        <option>강원도</option><option>충청도</option><option>전라도</option>
                        <option>경상도</option><option>제주도</option>
                    </select>
                </div>
                <button class="search-btn">검색하기</button>
            </section>

            <div class="result-section">
                <p id="result-text-display">찾으시는 팀이 여기에 나타납니다.</p>
            </div>
        </div>
    </main>

    <script>
        // 클릭 시 메뉴 고정/해제 로직
        function toggleMenu(element) {
            const isOpen = element.classList.contains('is-open');
            document.querySelectorAll('.category-item').forEach(item => item.classList.remove('is-open'));
            if (!isOpen) element.classList.add('is-open');
        }

        // 페이지 전환
        function goToFilterPage(sportName) {
            event.stopPropagation();
            document.getElementById('selected-sport-title').innerText = sportName;
            document.getElementById('result-text-display').innerText = sportName + " 종목의 모집 중인 팀이 없습니다.";
            document.getElementById('main-page').classList.remove('active');
            document.getElementById('filter-page').classList.add('active');
            window.scrollTo(0, 0);
        }

        function goToMainPage() {
            document.getElementById('filter-page').classList.remove('active');
            document.getElementById('main-page').classList.add('active');
            document.querySelectorAll('.category-item').forEach(item => item.classList.remove('is-open'));
        }
    </script>

</body>
</html>
