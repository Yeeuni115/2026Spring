<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sporty-Us | 취미 운동 매칭</title>
    <style>
        /* [1. 기본 스타일] */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background-color: #fcfcfc; color: #1d1d1f; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

        /* [2. 화면 전환 제어] */
        .page { display: none; } /* 기본적으로 모든 페이지는 숨김 */
        .page.active { display: block; animation: fadeIn 0.4s ease-in-out; } /* active 클래스만 노출 */

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* [3. 메인 페이지 (히어로 + 카테고리)] */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2693&auto=format&fit=crop');
            background-size: cover; background-position: center;
            height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center;
        }
        .hero h1 { font-size: 2.2rem; margin-bottom: 10px; font-weight: 700; }

        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 40px; }
        .category-item { position: relative; }
        .item-card { background: #fff; padding: 30px 20px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #eee; transition: 0.2s; }
        .item-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.05); }

        /* 드롭다운 호버 메뉴 */
        .sports-dropdown {
            display: none; position: absolute; top: 100%; left: 0; width: 100%; background: #fff;
            border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 10px 0; z-index: 100; margin-top: 10px;
        }
        .category-item:hover .sports-dropdown { display: block; }
        .sports-dropdown a { display: block; padding: 12px 20px; text-decoration: none; color: #444; font-size: 0.95rem; border-bottom: 1px solid #f8f8f8; transition: 0.2s; }
        .sports-dropdown a:hover { background: #f0f7ff; color: #007bff; font-weight: 600; }

        /* [4. 필터 및 결과 페이지] */
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .back-btn { background: #eee; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        
        .filter-bar { background: #fff; padding: 25px; border-radius: 15px; border: 1px solid #eee; display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 150px; }
        .filter-group label { font-size: 0.85rem; font-weight: 600; color: #777; }
        .filter-group select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; }
        
        .search-btn { background: #007bff; color: #fff; border: none; padding: 0 30px; border-radius: 8px; font-weight: 700; cursor: pointer; height: 45px; align-self: flex-end; }

        /* 팀 카드 목록 */
        .team-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .team-card { background: #fff; border-radius: 15px; border: 1px solid #eee; overflow: hidden; }
        .team-img { height: 160px; background: #eee; }
        .team-body { padding: 20px; }
        .team-body h3 { margin-bottom: 8px; }
        .team-body p { font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

    <main id="main-page" class="page active">
        <header class="hero">
            <h1>지루한 일상을 깨우는 움직임!</h1>
            <p>당신에게 딱 맞는 취미 운동 팀을 찾아보세요.</p>
        </header>

        <div class="container">
            <h2 style="text-align: center; margin-bottom: 30px;">어떤 운동을 시작해볼까요?</h2>
            <div class="category-grid">
                <div class="category-item">
                    <div class="item-card"><span>⚽</span><br><strong>구기 종목</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('풋살')">풋살</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('축구')">축구</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('농구')">농구</a>
                    </div>
                </div>
                <div class="category-item">
                    <div class="item-card"><span>🎾</span><br><strong>라켓 종목</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('테니스')">테니스</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('배드민턴')">배드민턴</a>
                    </div>
                </div>
                <div class="category-item">
                    <div class="item-card"><span>❄️</span><br><strong>이색 및 계절</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('아이스하키')">아이스하키</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('피겨')">피겨</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('서핑')">서핑</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <main id="filter-page" class="page">
        <div class="container">
            <div class="header-bar">
                <button class="back-btn" onclick="goToMainPage()">← 카테고리로 돌아가기</button>
                <h2 id="selected-sport-title">종목명</h2>
            </div>

            <section class="filter-bar">
                <div class="filter-group">
                    <label>성별</label>
                    <select><option>전체</option><option>남성</option><option>여성</option><option>혼성</option></select>
                </div>
                <div class="filter-group">
                    <label>나이대</label>
                    <select><option>전체</option><option>20대</option><option>30대</option><option>40대+</option></select>
                </div>
                <div class="filter-group">
                    <label>지역</label>
                    <select><option>서울 전체</option><option>강남구</option><option>성북구</option></select>
                </div>
                <button class="search-btn">팀 검색</button>
            </section>

            <div class="team-list">
                <div class="team-card">
                    <div class="team-img" style="background: url('https://images.unsplash.com/photo-1551244072-5d12893278ab?auto=format&fit=crop&w=500&q=80') center/cover;"></div>
                    <div class="team-body">
                        <h3 id="sample-team-name">추천 팀 정보</h3>
                        <p>📍 지역 정보가 표시됩니다.</p>
                        <p>⏰ 활동 시간이 표시됩니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 화면 전환 로직
        function goToFilterPage(sportName) {
            // 1. 선택한 종목 텍스트 반영
            document.getElementById('selected-sport-title').innerText = "내 주변 " + sportName + " 팀 찾기";
            document.getElementById('sample-team-name').innerText = sportName + " 취미 동호회";

            // 2. 페이지 전환
            document.getElementById('main-page').classList.remove('active');
            document.getElementById('filter-page').classList.add('active');

            // 3. 페이지 상단으로 이동
            window.scrollTo(0, 0);
        }

        function goToMainPage() {
            document.getElementById('filter-page').classList.remove('active');
            document.getElementById('main-page').classList.add('active');
        }
    </script>

</body>
</html>
