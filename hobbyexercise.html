<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sporty-Us | 취미 운동의 모든 것</title>
    <style>
        /* 기본 스타일 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f8f9fa; color: #333; line-height: 1.6; }
        a { text-decoration: none; color: inherit; }

        /* 히어로 섹션 */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1517649763962-0c623066013b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .hero h1 { font-size: 2.5rem; margin-bottom: 15px; font-weight: 800; }
        .hero p { font-size: 1.2rem; opacity: 0.9; }

        /* 섹션 공통 스타일 */
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        h2 { font-size: 1.5rem; margin-bottom: 25px; text-align: center; }

        /* 종목 선택 그리드 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 50px;
        }
        .category-card {
            background: white;
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .category-card:hover { 
            transform: translateY(-5px); 
            border-color: #007bff; 
            color: #007bff;
        }
        .category-card .icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }

        /* 필터 섹션 */
        .filter-bar {
            background: white;
            padding: 25px;
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 0.9rem; font-weight: bold; color: #666; }
        .filter-group select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            min-width: 150px;
            font-size: 1rem;
        }
        .search-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 0 40px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            align-self: flex-end;
            height: 45px;
        }
        .search-btn:hover { background: #0056b3; }

        /* 결과 예시 카드 */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .team-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .team-img { height: 180px; background-color: #ddd; position: relative; }
        .badge {
            position: absolute; top: 15px; left: 15px;
            background: #28a745; color: white; padding: 5px 12px;
            border-radius: 20px; font-size: 0.8rem; font-weight: bold;
        }
        .team-info { padding: 20px; }
        .team-info h3 { margin-bottom: 10px; }
        .team-info p { font-size: 0.9rem; color: #777; margin-bottom: 5px; }
        .tag-group { margin-top: 15px; }
        .tag {
            display: inline-block;
            background: #f1f3f5;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            margin-right: 5px;
            color: #495057;
        }

        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .search-btn { align-self: stretch; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>지루한 일상을 깨우는 움직임,<br>오늘부터 1일!</h1>
        <p>당신에게 딱 맞는 취미 운동 팀을 찾아보세요.</p>
    </header>

    <div class="container">
        <h2>어떤 운동을 시작해볼까요?</h2>
        <div class="category-grid">
            <div class="category-card">
                <span class="icon">⚽</span>
                <strong>구기 종목</strong>
                <p style="font-size: 0.8rem; color: #999; margin-top:5px;">풋살, 농구, 야구 등</p>
            </div>
            <div class="category-card">
                <span class="icon">🎾</span>
                <strong>라켓 종목</strong>
                <p style="font-size: 0.8rem; color: #999; margin-top:5px;">테니스, 배드민턴 등</p>
            </div>
            <div class="category-card">
                <span class="icon">🏃</span>
                <strong>액티비티</strong>
                <p style="font-size: 0.8rem; color: #999; margin-top:5px;">러닝, 클라이밍 등</p>
            </div>
            <div class="category-card">
                <span class="icon">❄️</span>
                <strong>이색/계절</strong>
                <p style="font-size: 0.8rem; color: #999; margin-top:5px;">아이스하키, 서핑 등</p>
            </div>
        </div>

        <section class="filter-bar">
            <div class="filter-group">
                <label>성별</label>
                <select>
                    <option>성별 무관</option>
                    <option>남성</option>
                    <option>여성</option>
                </select>
            </div>
            <div class="filter-group">
                <label>나이대</label>
                <select>
                    <option>전체 연령</option>
                    <option>20대</option>
                    <option>30대</option>
                    <option>40대 이상</option>
                </select>
            </div>
            <div class="filter-group">
                <label>활동 지역</label>
                <select>
                    <option>서울 전체</option>
                    <option>성북구</option>
                    <option>강남구</option>
                    <option>경기도</option>
                </select>
            </div>
            <button class="search-btn">팀 검색하기</button>
        </section>

        <h2>지금 모집 중인 팀</h2>
        <div class="result-grid">
            <article class="team-card">
                <div class="team-img" style="background: url('https://images.unsplash.com/photo-1551244072-5d12893278ab?auto=format&fit=crop&w=800&q=80') center/cover;">
                    <span class="badge">모집중</span>
                </div>
                <div class="team-info">
                    <h3>성북 아이스 썬더스</h3>
                    <p>📍 고려대학교 아이스링크</p>
                    <p>⏰ 매주 일요일 21:00</p>
                    <div class="tag-group">
                        <span class="tag">#아이스하키</span>
                        <span class="tag">#초보환영</span>
                        <span class="tag">#장비대여</span>
                    </div>
                </div>
            </article>

            <article class="team-card">
                <div class="team-img" style="background: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=800&q=80') center/cover;">
                    <span class="badge">마감임박</span>
                </div>
                <div class="team-info">
                    <h3>강남 풋살 크루</h3>
                    <p>📍 강남구 풋살파크</p>
                    <p>⏰ 매주 화요일 19:00</p>
                    <div class="tag-group">
                        <span class="tag">#풋살</span>
                        <span class="tag">#2030</span>
                        <span class="tag">#혼성</span>
                    </div>
                </div>
            </article>
        </div>
    </div>

</body>
</html>
