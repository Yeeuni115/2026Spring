    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. 유저님이 찾아내신 실제 Firebase 설정값 적용
        const firebaseConfig = {
            apiKey: "AIzaSyBUJo-6tWE65nNWOgdRzFxiXRxpimK7NYI",
            authDomain: "sporty-us.firebaseapp.com",
            projectId: "sporty-us",
            storageBucket: "sporty-us.firebasestorage.app",
            messagingSenderId: "976740450400",
            appId: "1:976740450400:web:af75cb95a42e9cd81b8305",
            measurementId: "G-3TZ9H1S288"
        };

        // 2. Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 전역 함수 설정 (HTML 버튼에서 사용 가능하도록 window 객체에 할당) ---
        
        // 로그인 처리
        window.handleLogin = function() {
            const name = document.getElementById('user-name').value;
            if (!name) return alert("이름을 입력해 주세요!");
            window.currentUser = name; // 로그인 사용자명 저장
            window.showPage('main-page');
            document.querySelector('.bottom-nav').style.display = 'flex';
        };

        // 페이지 전환 함수
        window.showPage = function(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // 내 모임 페이지 이동 시 데이터 불러오기
            if (pageId === 'my-group-page') fetchMyGroups();
        };

        // 가입 신청 버튼 (Firestore 저장)
        window.applyToTeam = async function(teamName) {
            if (!window.currentUser) return alert("로그인이 필요합니다.");

            try {
                await addDoc(collection(db, "applications"), {
                    applicant: window.currentUser,
                    teamName: teamName,
                    status: "승인 대기 중",
                    timestamp: serverTimestamp()
                });
                alert(`${teamName} 팀장에게 가입 신청을 성공적으로 보냈습니다!`);
            } catch (e) {
                console.error("저장 에러: ", e);
                alert("신청 중 오류가 발생했습니다. Firestore 규칙을 확인해주세요.");
            }
        };

        // 내 신청 내역 실시간 감시 (Firestore에서 읽기)
        function fetchMyGroups() {
            const list = document.getElementById('my-group-list');
            const q = query(collection(db, "applications"), where("applicant", "==", window.currentUser));

            onSnapshot(q, (querySnapshot) => {
                let html = "";
                if (querySnapshot.empty) {
                    html = `<div style="text-align:center; padding:50px; color:#86868b;">아직 신청한 모임이 없습니다.</div>`;
                } else {
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        html += `
                            <div style="background:#fff; padding:20px; border-radius:16px; border:1px solid #eee; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
                                <div>
                                    <strong style="font-size:1.1rem;">${data.teamName}</strong>
                                    <div style="font-size:0.8rem; color:#86868b; margin-top:4px;">상태: ${data.status}</div>
                                </div>
                                <span style="background:#fef3c7; color:#d97706; padding:4px 10px; border-radius:8px; font-size:0.8rem; font-weight:700;">${data.status}</span>
                            </div>
                        `;
                    });
                }
                list.innerHTML = html;
            });
        }
    </script>

        // --- 기능 구현부 ---

        function toggleMenu(element) {
            const isOpen = element.classList.contains('is-open');
            document.querySelectorAll('.category-item').forEach(item => item.classList.remove('is-open'));
            if (!isOpen) element.classList.add('is-open');
        }

        window.goToFilterPage = function(sportName) {
            if (window.event) window.event.stopPropagation();
            document.getElementById('selected-sport-title').innerText = sportName;
            document.getElementById('sport-select').value = sportName;
            document.getElementById('region-select').value = '전체';
            window.showPage('filter-page');
            filterTeams(); 
            window.scrollTo(0, 0);
        };

        window.goToMainPage = function() {
            window.showPage('main-page');
            document.querySelectorAll('.category-item').forEach(item => item.classList.remove('is-open'));
        };

        window.filterTeams = function() {
            const selectedSport = document.getElementById('sport-select').value;
            const selectedRegion = document.getElementById('region-select').value;
            const resultsContainer = document.getElementById('team-results');

            document.getElementById('selected-sport-title').innerText = selectedSport;

            const filtered = allTeams.filter(team => {
                const sportMatch = team.sport === selectedSport;
                const regionMatch = selectedRegion === '전체' || team.region === selectedRegion;
                return sportMatch && regionMatch;
            });

            resultsContainer.innerHTML = '';

            if (filtered.length === 0) {
                resultsContainer.innerHTML = `<div class="no-result">해당 조건의 ${selectedSport} 팀이 아직 없습니다. <br> 다른 지역을 선택해 보세요!</div>`;
                return;
            }

            filtered.forEach(team => {
                const card = `
                    <div class="team-card" onclick="this.classList.toggle('is-expanded')">
                        <div class="card-header">
                            <span class="recruiting-badge">모집 중</span>
                            <div style="font-size: 2.2rem; opacity: 0.15;">${team.img || '🏃'}</div>
                        </div>
                        <div class="card-body">
                            <h3>${team.name}</h3>
                            <div class="info-row">
                                <span class="label">지역</span> 
                                <span>${team.region}</span>
                            </div>
                            
                            <div class="tag-group">
                                <span class="tag skill">#${team.skill}</span>
                                <span class="tag">#전체연령</span>
                            </div>

                            <div class="detail-info">
                                <div class="info-row">
                                    <span class="label">시간대</span> 
                                    <span>${team.time}</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">연락처</span> 
                                    <span>${team.contact}</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">특징</span> 
                                    <span style="color: #007bff; font-weight: 600;">✨ ${team.features}</span>
                                </div>
                                <button class="join-btn" onclick="event.stopPropagation(); window.applyToTeam('${team.name}')">가입 신청하기</button>
                            </div>
                        </div>
                    </div>
                `;
                resultsContainer.innerHTML += card;
            });
        };
    </script>
