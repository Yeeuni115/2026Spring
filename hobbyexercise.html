<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sporty-Us | 취미 운동 매칭</title>
    <style>
        /* [1. 기본 스타일] */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background-color: #fcfcfc; color: #1d1d1f; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

        /* [2. 화면 전환 애니메이션] */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* [3. 메인 페이지 스타일] */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2693&auto=format&fit=crop');
            background-size: cover; background-position: center;
            height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center;
        }
        .hero h1 { font-size: 2.2rem; margin-bottom: 10px; font-weight: 700; }

        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 40px; }
        .category-item { position: relative; }
        .item-card { background: #fff; padding: 30px 20px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #eee; transition: 0.2s; }
        .item-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.05); }

        /* 호버 드롭다운 */
        .sports-dropdown {
            display: none; position: absolute; top: 100%; left: 0; width: 100%; background: #fff;
            border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 10px 0; z-index: 100; margin-top: 10px;
        }
        .category-item:hover .sports-dropdown { display: block; }
        .sports-dropdown a { display: block; padding: 12px 20px; text-decoration: none; color: #444; font-size: 0.95rem; border-bottom: 1px solid #f8f8f8; transition: 0.2s; }
        .sports-dropdown a:hover { background: #f0f7ff; color: #007bff; font-weight: 600; }

        /* [4. 필터 및 결과 페이지 스타일] */
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .back-btn { background: #eee; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
        
        .filter-bar { background: #fff; padding: 25px; border-radius: 15px; border: 1px solid #eee; display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 180px; }
        .filter-group label { font-size: 0.9rem; font-weight: 600; color: #555; margin-left: 2px; }
        .filter-group select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; background-color: #fff; cursor: pointer; }
        
        .search-btn { background: #007bff; color: #fff; border: none; padding: 0 40px; border-radius: 8px; font-weight: 700; cursor: pointer; height: 48px; transition: 0.2s; }
        .search-btn:hover { background: #0056b3; }

        /* 결과 영역 가이드 */
        .result-section { text-align: center; padding: 60px; border: 2px dashed #eee; border-radius: 20px; color: #999; }
    </style>
</head>
<body>

    <main id="main-page" class="page active">
        <header class="hero">
            <h1>지루한 일상을 깨우는 움직임!</h1>
            <p>당신에게 딱 맞는 취미 운동 팀을 찾아보세요.</p>
        </header>

        <div class="container">
            <h2 style="text-align: center; margin-bottom: 30px;">어떤 운동을 시작해볼까요?</h2>
            <div class="category-grid">
                <div class="category-item">
                    <div class="item-card"><span>⚽</span><br><strong>구기 종목</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('풋살')">풋살</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('축구')">축구</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('농구')">농구</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('야구')">야구</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('배구')">배구</a>
                    </div>
                </div>
                <div class="category-item">
                    <div class="item-card"><span>🎾</span><br><strong>라켓 종목</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('테니스')">테니스</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('배드민턴')">배드민턴</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('스쿼시')">스쿼시</a>
                    </div>
                </div>
                <div class="category-item">
                    <div class="item-card"><span>🏃</span><br><strong>액티비티</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('러닝')">러닝</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('클라이밍')">클라이밍</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('사이클')">사이클</a>
                    </div>
                </div>
                <div class="category-item">
                    <div class="item-card"><span>❄️</span><br><strong>이색 및 계절</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('아이스하키')">아이스하키</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('피겨')">피겨</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('서핑')">서핑</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('복싱')">복싱</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('주짓수')">주짓수</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <main id="filter-page" class="page">
        <div class="container">
            <div class="header-bar">
                <button class="back-btn" onclick="goToMainPage()">← 카테고리 돌아가기</button>
                <h2 id="selected-sport-title" style="color: #007bff;">종목명</h2>
            </div>

            <section class="filter-bar">
                <div class="filter-group">
                    <label>나이대</label>
                    <select>
                        <option>전체</option>
                        <option>무관</option>
                        <option>10대</option>
                        <option>20대</option>
                        <option>30대</option>
                        <option>40대+</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>지역</label>
                    <select>
                        <option>전체</option>
                        <option>서울</option>
                        <option>경기</option>
                        <option>인천</option>
                        <option>강원도</option>
                        <option>충청도</option>
                        <option>전라도</option>
                        <option>경상도</option>
                        <option>제주도</option>
                    </select>
                </div>

                <button class="search-btn">조건으로 검색하기</button>
            </section>

            <div class="result-section">
                <p id="result-text">원하는 조건으로 검색 버튼을 눌러보세요!</p>
            </div>
        </div>
    </main>

    <script>
        function goToFilterPage(sportName) {
            document.getElementById('selected-sport-title').innerText = sportName + " 팀 찾기";
            document.getElementById('main-page').classList.remove('active');
            document.getElementById('filter-page').classList.add('active');
            window.scrollTo(0, 0);
        }

        function goToMainPage() {
            document.getElementById('filter-page').classList.remove('active');
            document.getElementById('main-page').classList.add('active');
        }
    </script>

</body>
</html>
