<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sporty-Us | 취미 운동 매칭</title>
    <style>
        /* [1. 기본 스타일] */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background-color: #fcfcfc; color: #1d1d1f; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

        /* [2. 화면 전환 애니메이션] */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* [3. 메인 페이지 스타일] */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.15)), 
                        url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2693&auto=format&fit=crop');
            background-size: cover; background-position: center;
            height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center;
        }
        .hero h1 { font-size: 2.2rem; margin-bottom: 10px; font-weight: 700; letter-spacing: -0.5px; }

        /* [4. 2x2 카테고리 그리드] */
        .category-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* 첫째줄 2개, 둘째줄 2개 고정 */
            gap: 25px; 
            margin-top: 40px; 
        }
        .category-item { position: relative; }
        
        .item-card { 
            background: #fff; 
            padding: 40px 20px; 
            border-radius: 16px; 
            text-align: center; 
            cursor: pointer; 
            border: 1px solid #eee; 
            transition: all 0.25s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .item-card:hover, .item-card.active { 
            transform: translateY(-5px); 
            border-color: #007bff; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.06); 
        }
        .item-card span { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        /* [5. 드롭다운 메뉴 & 마우스 커서 유지 기법] */
        .sports-dropdown {
            display: none; 
            position: absolute; 
            top: 100%; 
            left: 0; 
            width: 100%; 
            background: #fff;
            border-radius: 12px; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.12); 
            padding: 10px 0; 
            z-index: 100; 
            margin-top: 12px; /* 카드와의 간격 */
            border: 1px solid #eee;
        }

        /* [핵심] 카드와 메뉴 사이의 보이지 않는 통로를 만들어 마우스 이탈 방지 */
        .sports-dropdown::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 0;
            width: 100%;
            height: 15px;
            background: transparent;
        }

        /* 호버 또는 클릭 시 메뉴 표시 */
        .category-item:hover .sports-dropdown,
        .category-item.is-open .sports-dropdown { 
            display: block; 
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sports-dropdown a { 
            display: block; 
            padding: 14px 20px; 
            text-decoration: none; 
            color: #444; 
            font-size: 1rem; 
            border-bottom: 1px solid #f9f9f9; 
            transition: 0.2s; 
        }
        .sports-dropdown a:hover { background: #f0f7ff; color: #007bff; padding-left: 25px; }
        .sports-dropdown a:last-child { border-bottom: none; }

        /* [6. 필터 페이지 스타일] */
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .back-btn { background: #f0f0f0; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 500; }
        
        .filter-bar { background: #fff; padding: 30px; border-radius: 20px; border: 1px solid #eee; display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 200px; }
        .filter-group label { font-size: 0.95rem; font-weight: 700; color: #444; }
        .filter-group select { padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 1rem; appearance: none; background: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="gray" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>') no-repeat right 15px center; }
        
        .search-btn { background: #007bff; color: #fff; border: none; padding: 0 40px; border-radius: 10px; font-weight: 700; cursor: pointer; height: 50px; }

        .result-section { text-align: center; padding: 80px; border: 2px dashed #eee; border-radius: 24px; color: #bbb; }

        @media (max-width: 600px) {
            .category-grid { grid-template-columns: 1fr; } /* 모바일은 1열 */
        }
    </style>
</head>
<body>

    <main id="main-page" class="page active">
        <header class="hero">
            <h1>지루한 일상을 깨우는 움직임!</h1>
            <p>나에게 딱 맞는 취미 운동 팀을 찾아보세요.</p>
        </header>

        <div class="container">
            <h2 style="text-align: center; margin-bottom: 10px;">어떤 운동을 시작해볼까요?</h2>
            <p style="text-align: center; color: #888; margin-bottom: 40px;">카테고리를 클릭하거나 마우스를 올려 세부 종목을 선택하세요.</p>
            
            <div class="category-grid">
                <div class="category-item" onclick="toggleMenu(this)">
                    <div class="item-card"><span>⚽</span><strong>구기 종목</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('풋살')">풋살</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('축구') Bryan">축구</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('농구')">농구</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('야구')">야구</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('배구')">배구</a>
                    </div>
                </div>
                <div class="category-item" onclick="toggleMenu(this)">
                    <div class="item-card"><span>🎾</span><strong>라켓 종목</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('테니스')">테니스</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('배드민턴')">배드민턴</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('스쿼시')">스쿼시</a>
                    </div>
                </div>
                <div class="category-item" onclick="toggleMenu(this)">
                    <div class="item-card"><span>🏃</span><strong>라이프스타일 / 액티비티</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('러닝')">러닝</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('클라이밍')">클라이밍</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('사이클')">사이클</a>
                    </div>
                </div>
                <div class="category-item" onclick="toggleMenu(this)">
                    <div class="item-card"><span>❄️</span><strong>이색 및 계절 스포츠</strong></div>
                    <div class="sports-dropdown">
                        <a href="javascript:void(0)" onclick="goToFilterPage('아이스하키')">아이스하키</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('피겨')">피겨</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('서핑')">서핑</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('복싱')">복싱</a>
                        <a href="javascript:void(0)" onclick="goToFilterPage('주짓수')">주짓수</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <main id="filter-page" class="page">
        <div class="container">
            <div class="header-bar">
                <button class="back-btn" onclick="goToMainPage()">← 뒤로가기</button>
                <h2 id="selected-sport-title" style="color: #007bff;">종목명</h2>
            </div>

            <section class="filter-bar">
                <div class="filter-group">
                    <label>나이대</label>
                    <select>
                        <option>전체</option><option>무관</option><option>10대</option>
                        <option>20대</option><option>30대</option><option>40대+</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>지역</label>
                    <select>
                        <option>서울</option><option>경기</option><option>인천</option>
                        <option>강원도</option><option>충청도</option><option>전라도</option>
                        <option>경상도</option><option>제주도</option>
                    </select>
                </div>
                <button class="search-btn">조건으로 검색</button>
            </section>

            <div class="result-section">
                <p>준비된 팀 목록이 없습니다. 조건을 다시 설정해 보세요!</p>
            </div>
        </div>
    </main>

    <script>
        // 클릭 시 메뉴 고정/해제 로직
        function toggleMenu(element) {
            // 다른 열려있는 메뉴 닫기
            document.querySelectorAll('.category-item').forEach(item => {
                if (item !== element) item.classList.remove('is-open');
            });
            // 현재 메뉴 토글
            element.classList.toggle('is-open');
        }

        // 페이지 전환
        function goToFilterPage(sportName) {
            event.stopPropagation(); // 부모 클릭 이벤트 방지
            document.getElementById('selected-sport-title').innerText = sportName + " 추천 팀";
            document.getElementById('main-page').classList.remove('active');
            document.getElementById('filter-page').classList.add('active');
            window.scrollTo(0, 0);
        }

        function goToMainPage() {
            document.getElementById('filter-page').classList.remove('active');
            document.getElementById('main-page').classList.add('active');
            // 열려있던 메뉴들 초기화
            document.querySelectorAll('.category-item').forEach(item => item.classList.remove('is-open'));
        }
    </script>

</body>
</html>
