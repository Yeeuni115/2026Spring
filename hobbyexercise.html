     window.showPage = function(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(pageId);
            if (target) target.classList.add('active');
            if (pageId === 'my-group-page') fetchMyGroups();
            window.scrollTo(0, 0);
        };

        window.goToFilterPage = function(sport) {
            currentSport = sport;
            currentRegion = "전체";
            const titleEl = document.getElementById('selected-sport-title');
            if(titleEl) titleEl.innerText = sport;
            
            document.querySelectorAll('.region-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === "전체");
            });

            renderTeams();
            window.showPage('filter-page');
        };

        window.filterByRegion = function(region, btn) {
            currentRegion = region;
            document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTeams();
        };

        function renderTeams() {
            const results = document.getElementById('team-results');
            const filtered = allTeams.filter(t => 
                t.sport === currentSport && 
                (currentRegion === "전체" || t.region === currentRegion)
            );

            results.innerHTML = filtered.length ? filtered.map(t => `
                <div class="team-card" onclick="this.classList.toggle('is-expanded')">
                    <span class="recruiting-badge">모집 중</span>
                    <div style="margin-top:35px;">
                        <h3>${t.name}</h3>
                        <p style="font-size:0.85rem; color:#666;">📍 ${t.region} | #${t.skill}</p>
                        <div class="detail-info">
                            <div class="info-row"><span class="label">특징</span> <span style="color:#007bff; font-weight:600;">✨ ${t.features}</span></div>
                            <button class="join-btn" onclick="event.stopPropagation(); window.applyToTeam('${t.name}')">가입 신청하기</button>
                        </div>
                    </div>
                </div>
            `).join('') : `<div style="text-align:center; width:100%; padding:80px; color:#888;">'${currentRegion}' 지역에 데이터가 없습니다.</div>`;
        }

        function fetchMyGroups() {
            const list = document.getElementById('my-group-list');
            const q = query(collection(db, "applications"), where("applicantPhone", "==", window.userSession.phone));
            onSnapshot(q, (qs) => {
                let html = "";
                if (qs.empty) html = `<div style="text-align:center; padding:50px; color:#86868b;">신청 내역이 없습니다.</div>`;
                else qs.forEach(d => {
                    const data = d.data();
                    html += `<div class="my-group-item">
                        <div><strong>${data.teamName}</strong><p style="font-size:0.8rem; color:#86868b;">상태: ${data.status}</p></div>
                        <button class="cancel-btn" onclick="window.cancelApply('${d.id}', '${data.teamName}')">취소</button>
                    </div>`;
                });
                list.innerHTML = html;
            });
        }
    </script>
