<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sporty-Us | 소모임 커뮤니티</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyBUJo-6tWE65nNWOgdRzFxiXRxpimK7NYI",
            authDomain: "sporty-us.firebaseapp.com",
            projectId: "sporty-us",
            storageBucket: "sporty-us.firebasestorage.app",
            messagingSenderId: "976740450400",
            appId: "1:976740450400:web:af75cb95a42e9cd81b8305",
            measurementId: "G-3TZ9H1S288"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 전역 변수 및 함수 설정 ---
        window.userInfo = { name: "", phone: "" };

        // 로그인 처리 (로그인 창을 아예 숨기고 메인으로 전환)
        window.handleLogin = function() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            
            if (!name || !phone) return alert("이름과 전화번호를 모두 입력해 주세요!");
            
            window.userInfo = { name, phone };
            window.showPage('main-page'); // 메인 페이지로 이동
            document.querySelector('.bottom-nav').style.display = 'flex'; // 하단바 보이기
        };

        // 페이지 전환 (모든 페이지 숨기고 해당 페이지만 표시)
        window.showPage = function(pageId) {
            document.querySelectorAll('.page').forEach(p => {
                p.classList.remove('active');
                p.style.display = 'none'; // 완전히 숨김
            });
            const targetPage = document.getElementById(pageId);
            targetPage.classList.add('active');
            targetPage.style.display = 'block'; // 해당 페이지만 표시
            
            if (pageId === 'my-group-page') fetchMyGroups();
            window.scrollTo(0, 0);
        };

        // 종목 클릭 시 이동 함수
        window.goToFilterPage = function(sport) {
            document.getElementById('selected-sport-title').innerText = sport;
            const results = document.getElementById('team-results');
            const filtered = allTeams.filter(t => t.sport === sport);

            results.innerHTML = filtered.map(t => `
                <div class="team-card" onclick="this.classList.toggle('is-expanded')">
                    <div class="card-body">
                        <span class="recruiting-badge">모집 중</span>
                        <h3 style="margin-top:35px;">${t.name}</h3>
                        <p style="font-size:0.85rem; color:#666;">📍 ${t.region} | #${t.skill}</p>
                        <div class="detail-info">
                            <div class="info-row"><span class="label">시간대</span> <span>${t.time}</span></div>
                            <div class="info-row"><span class="label">연락처</span> <span>플랩풋볼 플랫폼 내 신청</span></div>
                            <div class="info-row"><span class="label">특징</span> <span style="color:#007bff; font-weight:600;">✨ ${t.features}</span></div>
                            <button class="join-btn" onclick="event.stopPropagation(); window.applyToTeam('${t.name}')">가입 신청하기</button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            window.showPage('filter-page');
        };

        // 가입 신청 (DB 저장)
        window.applyToTeam = async function(teamName) {
            if (!window.userInfo.name) return alert("로그인이 필요합니다.");
            try {
                await addDoc(collection(db, "applications"), {
                    applicantName: window.userInfo.name,
                    applicantPhone: window.userInfo.phone,
                    teamName: teamName,
                    status: "승인 대기 중",
                    timestamp: serverTimestamp()
                });
                alert(`${teamName} 가입 신청이 완료되었습니다!`);
            } catch (e) {
                alert("신청 중 오류가 발생했습니다.");
            }
        };

        // 신청 취소 (DB 삭제)
        window.cancelApply = async function(docId, teamName) {
            if (!confirm(`${teamName} 신청을 취소하시겠습니까?`)) return;
            try {
                await deleteDoc(doc(db, "applications", docId));
                alert("취소되었습니다.");
            } catch (e) {
                alert("오류가 발생했습니다.");
            }
        };

        // 신청 내역 실시간 불러오기
        function fetchMyGroups() {
            const list = document.getElementById('my-group-list');
            const q = query(collection(db, "applications"), where("applicantPhone", "==", window.userInfo.phone));

            onSnapshot(q, (querySnapshot) => {
                let html = "";
                if (querySnapshot.empty) {
                    html = `<div style="text-align:center; padding:50px; color:#86868b;">신청 내역이 없습니다.</div>`;
                } else {
                    querySnapshot.forEach((document) => {
                        const data = document.data();
                        const docId = document.id;
                        html += `
                            <div class="my-group-item">
                                <div class="item-info">
                                    <strong>${data.teamName}</strong>
                                    <div style="font-size:0.85rem; color:#007bff; margin-top:5px;">신청자: ${data.applicantName}</div>
                                    <div style="font-size:0.8rem; color:#86868b;">상태: ${data.status}</div>
                                </div>
                                <button class="cancel-btn" onclick="window.cancelApply('${docId}', '${data.teamName}')">신청 취소</button>
                            </div>
                        `;
                    });
                }
                list.innerHTML = html;
            });
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@800&family=Pretendard:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #ffffff; background-image: radial-gradient(#e5e5e7 0.8px, transparent 0.8px); background-size: 24px 24px; color: #1d1d1f; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px 120px; }
        
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 로그인 */
        #login-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: #f5f5f7; position: fixed; width: 100%; top: 0; left: 0; z-index: 2000; }
        .login-card { background: #fff; padding: 40px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); width: 90%; max-width: 400px; text-align: center; }
        .login-card h1 { font-family: 'Poppins'; font-size: 2.5rem; color: #007bff; margin-bottom: 20px; }
        .login-input { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #d2d2d7; margin-bottom: 12px; font-size: 1rem; text-align: center; }
        .login-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: #007bff; color: #fff; font-weight: 700; cursor: pointer; font-size: 1.1rem; }

        /* 하단 네비게이션 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-top: 1px solid #f2f2f7; display: none; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { border: none; background: none; color: #86868b; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; font-weight: 700; }

        /* 카테고리 & 카드 */
        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .item-card { background: #fff; padding: 40px 20px; border-radius: 24px; text-align: center; cursor: pointer; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .team-card { background: #fff; border-radius: 24px; border: 1px solid #eee; overflow: hidden; transition: 0.3s; cursor: pointer; position: relative; }
        .card-body { padding: 20px; }
        .recruiting-badge { position: absolute; top: 15px; left: 15px; background: #007bff; color: #fff; padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 700; }
        .info-row { display: flex; align-items: flex-start; gap: 8px; font-size: 0.85rem; color: #555; margin-bottom: 5px; }
        .info-row .label { font-weight: 700; color: #888; min-width: 50px; }
        
        .detail-info { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee; }
        .team-card.is-expanded .detail-info { display: block; }
        .join-btn { width: 100%; margin-top: 15px; padding: 12px; border-radius: 12px; border: none; background: #007bff; color: #fff; font-weight: 700; cursor: pointer; }

        .my-group-item { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #eee; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .cancel-btn { background: #fff; color: #ff3b30; border: 1px solid #ff3b30; padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; cursor: pointer; }
    </style>
</head>

    <main id="filter-page" class="page">
